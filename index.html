            display: flex;

            gap: 6px;

            padding: 6px;
            border-radius: 16px;
        }
        .score-chip {
            background: #2f3547;

        }

            width: 100%;

            border-radius: 6px;
            border: 2px solid #4a5568;
            user-select: none;
            touch-action: none;
            overflow: hidden;
        }

            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .tick-mark {
            position: absolute;
            bottom: 0;
            transform: translateX(-50%);

        .tick-major {
            height: 22px;
            background: #f7d44a;
            width: 3px;
        }
        .tick-minor {
            height: 10px;
            background: #cbd5e0;
            width: 2px;

            background: #ffffff;

            justify-content: center;
            text-align: center;
            font-size: 0.5rem;
            font-weight: 700;

            padding: 2px 2px;
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;

            bottom: 5px;

            border: 1px dashed rgba(255,255,255,0.5);

            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;

            top: 2px;
            bottom: 2px;
            width: 2px;
            background: #e53e3e;
            box-shadow: 0 0 6px #e53e3e;

    function valueToPercent(v) { return 5 + (v - MIN_VAL) * 22.5; }
    function percentToValue(pct) { return MIN_VAL + (pct - 5) / 22.5; }
    function computeBarRange(center, type) { const half = BAR_HALF[type]; return { start: center - half, end: center + half }; }
    function isHit(secret, barStart, barEnd) { return secret >= barStart && secret <= barEnd; }

    // =====================================================================
    //  RENDERING HELPERS
    // =====================================================================
    function buildRulerHTML(extraInner = '', guessLanes = null, rulerHeight = 70) {
        let ticksHTML = '';
        for (let v = 1; v <= 5; v++) {
            const left = valueToPercent(v);
            ticksHTML += `<div class="tick-mark tick-major" style="left:${left}%;"></div>`;
        }
        for (let major = 1; major < 5; major++) {
            for (let i = 1; i <= 5; i++) {
                const minor = major + i / 6;
                const left = valueToPercent(minor);
                ticksHTML += `<div class="tick-mark tick-minor" style="left:${left}%;"></div>`;
            }
        }
        ticksHTML += `<div class="tick-mark tick-minor" style="left:0%;"></div>`;
        ticksHTML += `<div class="tick-mark tick-minor" style="left:2.5%;"></div>`;
        ticksHTML += `<div class="tick-mark tick-minor" style="left:97.5%;"></div>`;
        ticksHTML += `<div class="tick-mark tick-minor" style="left:100%;"></div>`;

        let phraseColumns = '';
        if (currentState && currentState.currentCard) {
            currentState.currentCard.answers.forEach((answer) => {
                phraseColumns += `<div class="phrase-column">${answer}</div>`;
            });
        }

        return `
            <div class="ruler-wrapper">
                <div class="ruler-container" id="ruler" style="height:${rulerHeight}px;">
                    <div class="ruler-ticks">${ticksHTML}</div>
                    ${extraInner}
                    ${guessLanes ? guessLanes : ''}
                </div>
                <div class="phrase-panel">${phraseColumns}</div>

        function start(e) {
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = ruler.getBoundingClientRect();
            startX = clientX;
            initialLeftPercent = parseFloat(element.style.left) || 0;
            dragging = true;
            element.setPointerCapture(e.pointerId || 1);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            window.addEventListener('touchmove', move, { passive: false });
            window.addEventListener('touchend', stop);
        }

        function move(e) {
            if (!dragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const dx = clientX - startX;
            const rulerRect = ruler.getBoundingClientRect();
            const rulerWidth = rulerRect.width;
            const dxPercent = (dx / rulerWidth) * 100;
            let newLeftPercent = initialLeftPercent + dxPercent;
            const elemWidth = parseFloat(element.style.width) || 0;
            const maxLeft = maxLeftPercent !== null ? maxLeftPercent : 100 - elemWidth;
            const minLeft = minLeftPercent !== null ? minLeftPercent : 0;
            newLeftPercent = Math.max(minLeft, Math.min(newLeftPercent, maxLeft));
            element.style.left = newLeftPercent + '%';
            if (onDrag) onDrag(newLeftPercent);
        }

        function stop() {
            dragging = false;
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', stop);
            window.removeEventListener('touchmove', move);
            window.removeEventListener('touchend', stop);
        }

        element.addEventListener('mousedown', start);
        element.addEventListener('touchstart', start, { passive: false });
    }

    function getLaneLayout(totalGuessers) {
        if (totalGuessers <= 1) return { rulerHeight: 70, laneHeight: 0, lanePadding: 0 };
        const rulerHeight = totalGuessers <= 3 ? 200 : 260;
        const lanePadding = 10;
        const laneHeight = (rulerHeight - lanePadding * 2) / totalGuessers;
        return { rulerHeight, laneHeight, lanePadding };
    }

    // =====================================================================
    //  ROOM SETUP
    // =====================================================================
    function renderSetup() {
        container.innerHTML = `
            <div style="text-align:center;">
                <h2>🎯 Cross the Line</h2>
                <div id="setupArea">
                    <button id="createRoomBtn">Create New Room</button>
                    <p style="margin:10px 0;">or</p>
                    <input type="text" id="roomCodeInput" placeholder="Enter room code" style="padding:5px; font-size:1rem; width:120px; text-align:center;">
                    <button id="joinRoomBtn">Join Room</button>
                </div>
                <div id="nameEntry" style="display:none; margin-top:10px;">
                    <input type="text" id="playerNameInput" placeholder="Your name" maxlength="12" style="padding:5px; font-size:1rem;">
                    <button id="submitNameBtn">Join</button>
                </div>
            </div>
        `;

        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const shuffledDeck = [...CARDS].sort(() => Math.random() - 0.5);
            const roomData = {
                phase: 'lobby',
                host: myUid,
                players: {},
                currentAnswererIndex: 0,
                currentCard: null,
                secretLine: null,
                guesses: {},
                guessQueue: [],
                currentGuesserStep: 0,
                showAllGuesses: true,
                deck: shuffledDeck,
                roundCount: 0
            };
            const newRoomRef = db.ref('rooms').push(roomData);
            roomId = newRoomRef.key;
            roomRef = newRoomRef;
            enterName();
        });

        document.getElementById('joinRoomBtn').addEventListener('click', () => {
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code) return alert("Enter a room code");
            roomRef = db.ref(`rooms/${code}`);
            roomId = code;
            roomRef.once('value', (snap) => {
                if (!snap.exists()) {
                    alert("Room not found");
                    roomRef = null;
                    roomId = null;
                } else {
                    enterName();
                }
            });
        });
    }

    function enterName() {
        const setupArea = document.getElementById('setupArea');
        const nameEntry = document.getElementById('nameEntry');
        if (setupArea) setupArea.style.display = 'none';
        if (nameEntry) nameEntry.style.display = 'block';

        document.getElementById('submitNameBtn').addEventListener('click', () => {
            const name = document.getElementById('playerNameInput').value.trim() || 'Player';
            joinRoom(name);
        });
    }

    function joinRoom(name) {
        roomRef.child('players').child(myUid).set({
            name: name,
            score: 0,
            isAnswerer: false
        }).then(() => {
            roomRef.on('value', (snapshot) => {
                currentState = snapshot.val();
                if (!currentState) {
                    container.innerHTML = "<p style='text-align:center;'>Room no longer exists.</p>";
                    return;
                }
                playerOrder = Object.keys(currentState.players);
                myIndex = playerOrder.indexOf(myUid);
                renderGame();
            });

            roomRef.child(`players/${myUid}`).onDisconnect().remove();
        });
    }

    // =====================================================================
    //  GAME RENDERING BASED ON PHASE
    // =====================================================================
    function renderGame() {
        if (!currentState) return;
        const phase = currentState.phase;
        const players = currentState.players || {};
        const totalPlayers = playerOrder.length;

        let html = '';

        // Scoreboard
        html += '<div class="scoreboard">';
        playerOrder.forEach(uid => {
            const p = players[uid];
            const active = (phase === 'answer' || phase === 'pick') && playerOrder[currentState.currentAnswererIndex] === uid;
            html += `<div class="score-chip${active ? ' active' : ''}">${p.name}: ${p.score}</div>`;
        });
        html += '</div>';

        if (phase === 'lobby') {
            html += `<div class="spectrum-area" style="text-align:center;">
                <p>Room code: <span class="room-code">${roomId}</span></p>
                <p>Waiting for players...</p>
                <div class="lobby-player-list">
                    ${playerOrder.map(uid => `<span>${players[uid].name}</span>`).join(' ')}
                </div>
                ${myUid === currentState.host ? `<button id="startGameBtn">Start Game (${totalPlayers} players)</button>` : '<p>Waiting for host to start...</p>'}
            </div>`;

            container.innerHTML = html;
            if (myUid === currentState.host) {
                document.getElementById('startGameBtn').addEventListener('click', () => {
                    if (totalPlayers < 2) return alert("Need at least 2 players");
                    startOnlineGame();
                });
            }
            return;
        }

        const card = currentState.currentCard;
        if (!card) {
            container.innerHTML = html + '<p>Loading...</p>';
            return;
        }

        if (phase === 'pick') {
            const answererUid = playerOrder[currentState.currentAnswererIndex];
            if (answererUid === myUid) {
                const deck = currentState.deck;
                const card1 = deck[0];
                const card2 = deck[1];
                html += `<div class="spectrum-area">
                    <p class="prompt">${players[myUid].name}, pick your question:</p>
                    <div class="pick-area">
                        <div class="pick-card" id="pickCard1">${card1.prompt.replace('{player}', 'a friend')}</div>
                        <div class="pick-card" id="pickCard2">${card2.prompt.replace('{player}', 'a friend')}</div>
                    </div>
                </div>`;
                container.innerHTML = html;
                document.getElementById('pickCard1').addEventListener('click', () => selectCardOnline(0));
                document.getElementById('pickCard2').addEventListener('click', () => selectCardOnline(1));
            } else {
                html += `<p class="message">Waiting for ${players[answererUid].name} to pick a question...</p>`;
                container.innerHTML = html;
            }
            return;
        }

        if (phase === 'answer') {
            const answererUid = playerOrder[currentState.currentAnswererIndex];
            if (answererUid === myUid) {
                const halfWidthPercent = BAR_HALF.short * 22.5;
                const secretLine = currentState.secretLine || 3.0;
                const initialLeft = valueToPercent(secretLine) - halfWidthPercent;
                html += `<div class="spectrum-area">
                    <div class="prompt">📋 ${card.prompt}</div>
                    <p style="text-align:center; margin:5px 0; font-size:0.9rem;"><strong>${players[myUid].name}, drag the box to set your spot.</strong></p>
                `;
                html += buildRulerHTML(`<div id="answerBar" class="answer-bar" style="left:${initialLeft}%; width:${halfWidthPercent * 2}%;"></div>`);
                html += `<div style="text-align:center; margin-top:10px;"><button id="lockInBtn">🔒 Lock In</button></div></div>`;
                container.innerHTML = html;

                const barEl = document.getElementById('answerBar');
                const minLeftPercent = 5 - halfWidthPercent;
                const maxLeftPercent = 95 - halfWidthPercent;
                let currentSecret = secretLine;

                function updateSecretFromLeft(leftPercent) {
                    const centerPercent = leftPercent + halfWidthPercent;
                    let newVal = percentToValue(centerPercent);
                    newVal = Math.min(MAX_VAL, Math.max(MIN_VAL, newVal));
                    currentSecret = newVal;
                }
                makeDraggable(barEl, updateSecretFromLeft, minLeftPercent, maxLeftPercent);

                document.getElementById('lockInBtn').addEventListener('click', () => {
                    roomRef.update({
                        secretLine: currentSecret,
                        phase: 'guess',
                        guessQueue: playerOrder.filter(uid => uid !== answererUid),
                        currentGuesserStep: 0
                    });
                });
            } else {
                html += `<p class="message">Waiting for ${players[answererUid].name} to set the line...</p>`;
                container.innerHTML = html;
            }
            return;
        }

        if (phase === 'guess') {
            const guessQueue = currentState.guessQueue;
            const step = currentState.currentGuesserStep;
            if (step < guessQueue.length) {
                const currentGuesserUid = guessQueue[step];
                if (currentGuesserUid === myUid) {
                    const totalGuessers = guessQueue.length;
                    const laneIndex = step;
                    html += `<div class="spectrum-area">
                        <div class="prompt">🔍 ${card.prompt}</div>
                        <p style="text-align:center; margin:5px 0; font-size:0.9rem;"><strong>${players[myUid].name}, choose bar and drag.</strong></p>
                        <div class="bar-type-selector">
                            <button class="bar-type-btn" data-type="long">Long (1pt)</button>
                            <button class="bar-type-btn selected" data-type="medium">Medium (2pt)</button>
                            <button class="bar-type-btn" data-type="short">Short (3pt)</button>
                        </div>`;

                    let selectedType = 'medium';
                    let guessCenter = 3.0;
                    function barWidthPercent(type) { return BAR_HALF[type] * 22.5 * 2; }
                    function barLeftPercent(center, type) { return valueToPercent(center) - BAR_HALF[type] * 22.5; }

                    let guessLanesHTML = '';
                    let rulerHeight = 70;
                    let laneHeight = 0, lanePadding = 0;
                    if (currentState.showAllGuesses) {
                        const layout = getLaneLayout(totalGuessers);
                        rulerHeight = layout.rulerHeight;
                        laneHeight = layout.laneHeight;
                        lanePadding = layout.lanePadding;
                        const guesses = currentState.guesses || {};
                        for (let i = 0; i < step; i++) {
                            const uid = guessQueue[i];
                            const g = guesses[uid];
                            if (!g) continue;
                            const left = valueToPercent(g.rangeStart);
                            const width = (g.rangeEnd - g.rangeStart) * 22.5;
                            const top = rulerHeight - lanePadding - (i + 1) * laneHeight + 4;
                            guessLanesHTML += `<div class="guess-bar" style="left:${left}%; width:${width}%; top:${top}px; height:${laneHeight - 4}px; background:#aaa; pointer-events:none;">${players[uid].name}</div>`;
                        }
                    }

                    const initialWidth = barWidthPercent(selectedType);
                    const initialLeft = barLeftPercent(guessCenter, selectedType);
                    let currentBarStyle = '';
                    if (currentState.showAllGuesses) {
                        const top = rulerHeight - lanePadding - (laneIndex + 1) * laneHeight + 4;
                        currentBarStyle = `top:${top}px; height:${laneHeight - 4}px;`;
                    } else {
                        currentBarStyle = `top:8px; bottom:8px;`;
                    }

                    html += buildRulerHTML(
                        `<div id="guessBar" class="guess-bar" style="left:${initialLeft}%; width:${initialWidth}%; ${currentBarStyle}">${players[myUid].name}</div>`,
                        guessLanesHTML,
                        rulerHeight
                    );
                    html += `<div style="text-align:center; margin-top:10px;"><button id="placeBarBtn">✅ Place Bar</button></div></div>`;
                    container.innerHTML = html;

                    const barEl = document.getElementById('guessBar');
                    const typeBtns = document.querySelectorAll('.bar-type-btn');

                    function updateBarDisplay() {
                        const width = barWidthPercent(selectedType);
                        let left = barLeftPercent(guessCenter, selectedType);
                        left = Math.max(0, Math.min(100 - width, left));
                        barEl.style.width = width + '%';
                        barEl.style.left = left + '%';
                        barEl.textContent = players[myUid].name;
                    }

                    function onBarDrag(leftPercent) {
                        const widthPercent = parseFloat(barEl.style.width);
                        const centerPercent = leftPercent + widthPercent / 2;
                        let newCenter = percentToValue(centerPercent);
                        newCenter = Math.min(MAX_VAL, Math.max(MIN_VAL, newCenter));
                        guessCenter = newCenter;
                        updateBarDisplay();
                    }

                    makeDraggable(barEl, onBarDrag);

                    typeBtns.forEach(btn => {
                        btn.addEventListener('click', () => {
                            typeBtns.forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                            selectedType = btn.dataset.type;
                            updateBarDisplay();
                        });
                    });

                    document.getElementById('placeBarBtn').addEventListener('click', () => {
                        const range = computeBarRange(guessCenter, selectedType);
                        roomRef.child('guesses').child(myUid).set({
                            playerIndex: myIndex,
                            barType: selectedType,
                            center: guessCenter,
                            rangeStart: range.start,
                            rangeEnd: range.end
                        });
                        roomRef.child('currentGuesserStep').set(step + 1);
                        if (step + 1 >= guessQueue.length) {
                            roomRef.child('phase').set('reveal');
                        }
                    });
                } else {
                    html += `<p class="message">Waiting for ${players[currentGuesserUid].name} to place their guess...</p>`;
                    container.innerHTML = html;
                }
            } else {
                roomRef.child('phase').set('reveal');
            }
            return;
        }

        if (phase === 'reveal') {
            const guessQueue = currentState.guessQueue;
            const guesses = currentState.guesses || {};
            const answererUid = playerOrder[currentState.currentAnswererIndex];
            const totalGuessers = guessQueue.length;
            const colors = ['#fc8181', '#68d391', '#63b3ed', '#f6ad55', '#b794f4', '#fbb6ce', '#4fd1c5', '#f6e05e'];

            let barsHTML = '';
            let rulerHeight = 70;
            if (currentState.showAllGuesses) {
                const layout = getLaneLayout(totalGuessers);
                rulerHeight = layout.rulerHeight;
                const laneHeight = layout.laneHeight;
                const lanePadding = layout.lanePadding;
                guessQueue.forEach((uid, i) => {
                    const g = guesses[uid];
                    if (!g) return;
                    const left = valueToPercent(g.rangeStart);
                    const width = (g.rangeEnd - g.rangeStart) * 22.5;
                    const color = colors[playerOrder.indexOf(uid) % colors.length];
                    const top = rulerHeight - lanePadding - (i + 1) * laneHeight + 4;
                    barsHTML += `<div class="guess-bar" style="left:${left}%; width:${width}%; top:${top}px; height:${laneHeight - 4}px; background:${color}; pointer-events:none;">${players[uid].name}</div>`;
                });
            } else {
                guessQueue.forEach(uid => {
                    const g = guesses[uid];
                    if (!g) return;
                    const left = valueToPercent(g.rangeStart);
                    const width = (g.rangeEnd - g.rangeStart) * 22.5;
                    const color = colors[playerOrder.indexOf(uid) % colors.length];
                    barsHTML += `<div class="guess-bar" style="left:${left}%; width:${width}%; background:${color}; pointer-events:none;">${players[uid].name}</div>`;
                });
            }

            const halfWidthPercent = BAR_HALF.short * 22.5;
            const answerLeft = valueToPercent(currentState.secretLine || 3) - halfWidthPercent;
            const answerBarHTML = `<div class="answer-bar" style="left:${answerLeft}%; width:${halfWidthPercent * 2}%; pointer-events:none;"></div>`;

            html += `<div class="spectrum-area">
                <div class="prompt">📋 ${card.prompt}</div>
                <p style="text-align:center; margin:5px 0;"><strong>Reveal! ${players[answererUid].name}'s line is the red mark.</strong></p>
                ${buildRulerHTML(answerBarHTML + barsHTML, null, rulerHeight)}
                <div style="margin-top:15px;">
            `;

            let roundResults = '';
            guessQueue.forEach(uid => {
                const g = guesses[uid];
                if (!g) return;
                const hit = isHit(currentState.secretLine, g.rangeStart, g.rangeEnd);
                const pts = hit ? BAR_POINTS[g.barType] : 0;
                roundResults += `<div class="result-line"><strong>${players[uid].name}</strong> (${g.barType}): ${hit ? `✅ Hit! +${pts} pt` : '❌ Missed'}</div>`;
            });
            html += roundResults + `</div></div>`;

            const winners = playerOrder.filter(uid => (players[uid].score || 0) >= 12);
            if (winners.length > 0) {
                html += `<div class="winner-banner">🏆 Winner(s): ${winners.map(uid => players[uid].name).join(', ')} reached 12 points! 🏆</div>`;
                if (myUid === currentState.host) {
                    html += `<button id="newGameBtn">Play Again</button>`;
                }
            } else {
                if (myUid === currentState.host) {
                    html += `<button id="nextRoundBtn">Next Round ▶</button>`;
                } else {
                    html += `<p>Waiting for host to start next round...</p>`;
                }
            }
            container.innerHTML = html;

            if (myUid === currentState.host) {
                document.getElementById('nextRoundBtn')?.addEventListener('click', nextRound);
                document.getElementById('newGameBtn')?.addEventListener('click', resetGame);
            }
        }
    }

    // =====================================================================
    //  ONLINE ACTIONS
    // =====================================================================
    function startOnlineGame() {
        const randomIndex = Math.floor(Math.random() * playerOrder.length);
        roomRef.update({
            phase: 'pick',
            currentAnswererIndex: randomIndex,
            secretLine: 3.0,
            guesses: {},
            guessQueue: [],
            currentGuesserStep: 0,
            currentCard: null
        });
    }

    function selectCardOnline(cardIndex) {
        const deck = currentState.deck.slice();
        const chosen = deck.splice(cardIndex, 1)[0];
        const other = deck.shift();
        const newDeck = [...deck, other];
        if (chosen.prompt.includes('{player}')) {
            const otherPlayers = playerOrder.filter(uid => uid !== myUid);
            const target = otherPlayers[Math.floor(Math.random() * otherPlayers.length)];
            chosen.prompt = chosen.prompt.replace('{player}', currentState.players[target].name);
        }
        roomRef.update({
            currentCard: chosen,
            deck: newDeck,
            phase: 'answer'
        });
    }

    function nextRound() {
        const nextIndex = (currentState.currentAnswererIndex + 1) % playerOrder.length;
        roomRef.update({
            phase: 'pick',
            currentAnswererIndex: nextIndex,
            secretLine: 3.0,
            guesses: {},
            guessQueue: [],
            currentGuesserStep: 0,
            currentCard: null
        });
    }

    function resetGame() {
        playerOrder.forEach(uid => {
            roomRef.child(`players/${uid}/score`).set(0);
        });
        startOnlineGame();
    }
</script>
